name: Mobile + Release
on: workflow_dispatch

permissions: write-all

env:
  PROJECT_NAME: FNF-Troll-Engine
  REPO_PATH: aigerimsarsen0-crypto/FNF-Troll-Engine

jobs:
  get-commit-hash:
    runs-on: ubuntu-latest
    outputs:
      commit_hash: ${{ steps.get_commit_hash.outputs.COMMIT_HASH }}
    steps:
      - name: Check Repository
        run: |
          echo "GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
          echo "REPO_PATH: ${{ env.REPO_PATH }}"
          if [[ "$GITHUB_REPOSITORY" != "${{ env.REPO_PATH }}" ]]; then
            echo "Doesn't seem to be correct, returning SIGABRT..."
            exit 6
          else
            echo "Seems to be correct..."
          fi

      - name: Get latest commit hash
        id: get_commit_hash
        run: |
          commit_hash=${GITHUB_SHA::7}
          echo "Latest commit hash is $commit_hash"
          # Исправлено устаревшее предупреждение set-output:
          echo "COMMIT_HASH=$commit_hash" >> "$GITHUB_OUTPUT"

  build:
    name: ${{ matrix.name }}
    needs: get-commit-hash
    strategy:
      fail-fast: false # <-- Добавлено: предотвращает отмену iOS при падении Android
      matrix:
        include:
          - name: Android
            os: macos-15
            buildArgs: "android -final -D officialBuild"
            artifactName: androidBuild
            artifactPath: "export/release/android/bin/app/build/outputs/apk/release/*.apk"
          - name: iOS
            os: macos-15
            buildArgs: "ios -final -nosign -D officialBuild"
            artifactName: iOSBuild
            artifactPath: "export/release/ios/build/Release-iphoneos/PibbyEngine.ipa"
    uses: ./.github/workflows/build.yml
    with:
        name: ${{ matrix.name }}
        os: ${{ matrix.os }}
        buildArgs: ${{ matrix.buildArgs }}
        artifactName: ${{ matrix.artifactName }}
        artifactPath: ${{ matrix.artifactPath }}

  Releaser:
    needs: [get-commit-hash, build]
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Download Android Build
        uses: actions/download-artifact@v4 # Рекомендуется использовать v4 для устранения предупреждений Node.js 20
        with:
           name: androidBuild
           path: /home/runner

      - name: Move Android File
        run: mv /home/runner/${{ env.PROJECT_NAME }}-release.apk /home/runner/${{ env.PROJECT_NAME }}-Android.apk

      - name: Download iOS Build
        uses: actions/download-artifact@v4 # Рекомендуется использовать v4
        with:
           name: iOSBuild
           path: ${{ github.workspace }}

      - name: Move iOS File
        run: mv ${{ github.workspace }}/${{ env.PROJECT_NAME }}.ipa /home/runner/${{ env.PROJECT_NAME }}.ipa

      - name: Publish The Release
        uses: softprops/action-gh-release@v2
        with:
          # Исправлена ошибка: несуществующий needs.get-gitversion-hash заменен на get-commit-hash
          name: "HOTFIX 0.71 (V${{ needs.get-commit-hash.outputs.commit_hash }})"
          tag_name: "release-${{ needs.get-commit-hash.outputs.commit_hash }}"
          make_latest: true
          files: |
            /home/runner/*.apk
            /home/runner/*.ipa
